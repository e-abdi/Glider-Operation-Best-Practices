site_name: Underwater Glider Operations Knowledge Base
site_url: https://e-abdi.github.io/Glider-Operation-Best-Practices/
site_description: >-
  Comprehensive guides, best practices, and operational checklists for
  underwater glider deployment, recovery, maintenance, and mission planning.
site_author: Glider Operations Team
docs_dir: docs
site_dir: site

repo_name: e-abdi/Glider-Operation-Best-Practices
repo_url: https://github.com/e-abdi/Glider-Operation-Best-Practices
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2025 Glider Operations Team

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.tabs.link
    - content.action.edit
    - content.action.view

extra_css:
  - stylesheets/extra.css


# ---------------------------------------------------------------------------
# Javascript
# ---------------------------------------------------------------------------
extra_javascript:
  - javascripts/mermaid.min.js
  - javascripts/mermaid.js


# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search:
      lang: en
  - pdf-export:
      verbose: false
      media_type: print
      enabled_if_env: ENABLE_PDF_EXPORT
      combined: false
  - minify:
      minify_html: true

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: On this page
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format


